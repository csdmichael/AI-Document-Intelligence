name: Deploy UI Frontend

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-ui:
    name: Deploy UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load shared config
        run: |
          cat .github/config.env >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install and build UI
        working-directory: ui
        run: |
          npm install
          npm run build
          cp server.js dist/server.js
          cp -n package.json dist/package.json 2>/dev/null || true

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.UI_APP_NAME }}
          package: ui/dist
